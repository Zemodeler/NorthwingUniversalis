l_english:
 TCS:0 "The Crimson Succession"
 TCS_DEF:0 "The Crimson Succession"
 WILDERNESS:0 "Wilderness"
 WILDERNESS_DEF:0 "Wilderness"

 # Bookmarks
 NWU_BOOKMARK_1780_NAME:0 "1780"
 NWU_BOOKMARK_1780_DESC:0 "The Northwing Universalis timeline begins in 1780."
 NWU_TCS_BOOKMARK_DESC:0 "The Crimson Succession stands as a major power at the dawn of the 1780 timeline."
 TCS_MATEPLAYSS_DESC:0 "The first leader of The Crimson Succession at the dawn of the 1780 timeline."

 # Focuses
 TCS_the_kingdom_has_fallen:0 "The Kingdom Has Fallen"
 TCS_the_kingdom_has_fallen_desc:0 "The old monarchy lies in ruins. We must rally what remains and claim a new destiny."
 TCS_secure_memelburg:0 "Secure Memelburg"
 TCS_secure_memelburg_desc:0 "Fortify key positions in Memelburg and protect the ministries from collapse."
 TCS_emergency_military_council:0 "Emergency Military Council"
 TCS_emergency_military_council_desc:0 "Place the armed forces at the heart of the state to restore order and preserve our core institutions."
 TCS_preserve_royal_archives:0 "Preserve the Royal Archives"
 TCS_preserve_royal_archives_desc:0 "Protect the documents and symbols of the old kingdom, even as a new state is born."
 TCS_seal_ministry_district:0 "Seal the Ministry District"
 TCS_seal_ministry_district_desc:0 "Lock down the capital’s administrative center to keep the emergent state functioning."
 TCS_rally_officer_corps:0 "Rally the Officer Corps"
 TCS_rally_officer_corps_desc:0 "Bring the military leadership together and restore discipline across the armed forces."
 TCS_declare_the_rebirth:0 "Declare the Rebirth"
 TCS_declare_the_rebirth_desc:0 "Announce the birth of a successor state and mobilize the population behind a new national purpose."
 TCS_reopen_command_bunkers:0 "Reopen Command Bunkers"
 TCS_reopen_command_bunkers_desc:0 "Reestablish the bunkers that once guided the realm’s defenses."
 TCS_stabilize_the_military:0 "Stabilize the Military"
 TCS_stabilize_the_military_desc:0 "Reduce chaos within the armed forces and set a new chain of command."
 TCS_a_state_not_a_remnant:0 "A State, Not a Remnant"
 TCS_a_state_not_a_remnant_desc:0 "Assert that we are a legitimate government, not a ruined remnant of the old order."
 TCS_the_successor_state:0 "The Successor State"
 TCS_the_successor_state_desc:0 "Formally establish the successor state and bind our factions into a single national project."
 TCS_map_the_fractured_state:0 "Map the Fractured State"
 TCS_map_the_fractured_state_desc:0 "Chart the political terrain and identify allies, enemies, and internal divisions."
 TCS_emergency_census:0 "Emergency Census"
 TCS_emergency_census_desc:0 "Take stock of our population and manpower to guide rebuilding efforts."
 TCS_restore_civil_registry:0 "Restore the Civil Registry"
 TCS_restore_civil_registry_desc:0 "Rebuild civil administration so the new state can govern effectively."

 # Decisions
 TCS_monitor_royal_continuists:0 "Monitor Royal Continuists"
 TCS_monitor_royal_continuists_desc:0 "Keep a watchful eye on those who would restore the old royal line."
 TCS_negotiate_with_republican_committees:0 "Negotiate with Republican Committees"
 TCS_negotiate_with_republican_committees_desc:0 "Engage republican factions to reduce dissent and reach compromise."
 TCS_pressure_provincial_assemblies:0 "Pressure Provincial Assemblies"
 TCS_pressure_provincial_assemblies_desc:0 "Use central authority to keep the provinces aligned with the national government."
 TCS_offer_reconstruction_grants:0 "Offer Reconstruction Grants"
 TCS_offer_reconstruction_grants_desc:0 "Fund reconstruction to win support and restore order."
 TCS_investigate_officer_league:0 "Investigate Officer League"
 TCS_investigate_officer_league_desc:0 "Probe the officer league’s activities and contain any conspiracies."

 # Ideas
 TCS_shock_of_collapse:0 "Shock of Collapse"
 TCS_shock_of_collapse_desc:0 "The state is still reeling from the fall of the old regime."
 TCS_reopened_command_bunkers:0 "Reopened Command Bunkers"
 TCS_reopened_command_bunkers_desc:0 "Command bunkers are operational once again, improving coordination and resilience."
 TCS_stabilized_military_authority:0 "Stabilized Military Authority"
 TCS_stabilized_military_authority_desc:0 "The armed forces are under stable control and able to play a constructive role."
 TCS_rebirth_declared:0 "Rebirth Declared"
 TCS_rebirth_declared_desc:0 "The successor state has been proclaimed and the population is rallying behind it."
 TCS_restored_civil_registry:0 "Restored Civil Registry"
 TCS_restored_civil_registry_desc:0 "Civil records are being rebuilt to restore governance and public trust."
 TCS_grand_coalition_idea:0 "Grand Coalition"
 TCS_grand_coalition_idea_desc:0 "A broad coalition supports the state’s survival and policy direction."
 TCS_legacy_eternal_idea:0 "Legacy Eternal"
 TCS_legacy_eternal_idea_desc:0 "The state draws on the legend of the old kingdom to justify its authority."

 # Events
 TCS_event.1:0 "The Fall of the Old Kingdom"
 TCS_event.1.desc:0 "News of the old kingdom’s collapse reaches the capital. How will we respond?"
 TCS_event.2:0 "Emergency Military Council"
 TCS_event.2.desc:0 "A council of senior officers has gathered to shape the new state."
 TCS_event.3:0 "Proclamation of Rebirth"
 TCS_event.3.desc:0 "A formal declaration to the people that a new era has begun."
